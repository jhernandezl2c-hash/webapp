<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · En Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d12;
    --bg2:#0e1219;
    --panel:#11151d;
    --line:#1f2733;
    --text:#eef1f6;
    --muted:#7c8696;
    --accent:#ffb703;
    --accent-soft:#3a2f0e;
    --teal:#00c2a8;
    --live:#ff3b3b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 500px at 100% -10%, rgba(0,194,168,.08), transparent),
      radial-gradient(700px 400px at -10% 10%, rgba(255,183,3,.06), transparent),
      var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--live);animation:pulse 1.6s infinite;}
  .brand-text{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:.3px;font-size:16px;}
  .brand-text small{display:block;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:1px;}
  .cast-btn{
    display:flex;align-items:center;gap:8px;
    background:transparent;border:1px solid var(--accent);
    color:var(--accent);padding:9px 16px;border-radius:6px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;
    letter-spacing:.5px;transition:.2s;
  }
  .cast-btn:hover{background:var(--accent);color:#1a1300;}

  main{
    max-width:1140px;margin:0 auto;padding:24px 18px 60px;
    display:grid;grid-template-columns:1fr;gap:20px;
  }
  @media(min-width:900px){
    main{grid-template-columns:2fr 1fr;align-items:start;}
  }

  .player-wrap{
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    overflow:hidden;position:relative;
  }
  .player-wrap::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
    border:1px solid transparent;
    background:
      linear-gradient(var(--panel),var(--panel)) padding-box,
      linear-gradient(135deg, var(--accent), transparent 30%, transparent 70%, var(--teal)) border-box;
    -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    opacity:.5;
  }
  .player-frame{
    position:relative;width:100%;aspect-ratio:16/9;background:#000;
  }
  .player-frame iframe{width:100%;height:100%;border:0;display:block;}
  .player-empty{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;color:var(--muted);
    text-align:center;padding:20px;font-family:'IBM Plex Mono',monospace;font-size:13px;
  }
  .player-empty a{color:var(--teal);}
  .player-meta{padding:14px 18px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .player-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;}
  .live-pill{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,59,59,.12);color:var(--live);
    padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;
    letter-spacing:1px;font-family:'IBM Plex Mono',monospace;
  }
  .live-pill .blip{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:0;overflow:hidden;
  }
  .panel h2{
    font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:2px;color:var(--accent);padding:14px 16px;
    border-bottom:1px solid var(--line);background:rgba(255,183,3,.04);
  }
  .match-list{max-height:74vh;overflow-y:auto;}
  .match-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;
    border-left:2px solid transparent;
  }
  .match-row.is-live{border-left-color:var(--live);background:rgba(255,59,59,.04);}
  .match-row:last-child{border-bottom:none;}
  .match-teams{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .match-teams strong{font-weight:600;font-size:13.5px;}
  .match-score{
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;
    color:var(--text);
  }
  .match-time{color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;text-align:right;}
  .match-time.is-live{color:var(--live);font-weight:600;}
  .group-tag{color:var(--muted);font-size:11px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--teal);color:var(--text);
    padding:12px 18px;border-radius:6px;font-size:13px;max-width:90vw;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <span class="brand-text">Mundial 2026<small>TRANSMISIÓN EN VIVO</small></span>
  </div>
  <button class="cast-btn" id="castBtn">⛶ TRANSMITIR</button>
</header>

<main>
  <section class="player-wrap">
    <div class="player-frame" id="playerFrame">
      <div class="player-empty" id="playerEmpty">
        <div>SIN SEÑAL</div>
      </div>
    </div>
    <div class="player-meta">
      <span class="player-title" id="playerTitle">Sin transmisión activa</span>
      <span class="live-pill" id="livePill" style="display:none"><span class="blip"></span>EN VIVO</span>
    </div>
  </section>

  <aside class="panel">
    <h2>Partidos · Mundial 2026</h2>
    <div class="match-list" id="matchList">Cargando partidos…</div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
